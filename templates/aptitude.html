<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aptitude Quiz</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

        <div class="container mt-5">

                <div class="card shadow p-4">

                        <h2 class="text-center text-primary mb-4">
                                📊 Aptitude Quiz
                        </h2>

                        <form method="POST" action="/result">

                                <!-- Question 1 -->

                                <h5>1. What is 15 + 20 ?</h5>

                                <input type="radio" name="q1" value="25"> 25 <br>
                                <input type="radio" name="q1" value="35"> 35 <br>
                                <input type="radio" name="q1" value="40"> 40 <br>
                                <input type="radio" name="q1" value="30"> 30 <br><br>

                                <!-- Question 2 -->

                                <h5>2. What is the square of 12?</h5>

                                <input type="radio" name="q2" value="144"> 144 <br>
                                <input type="radio" name="q2" value="124"> 124 <br>
                                <input type="radio" name="q2" value="132"> 132 <br>
                                <input type="radio" name="q2" value="156"> 156 <br><br>

                                <!-- Question 3 -->

                                <h5>3. Which number is even?</h5>

                                <input type="radio" name="q3" value="17"> 17 <br>
                                <input type="radio" name="q3" value="21"> 21 <br>
                                <input type="radio" name="q3" value="28"> 28 <br>
                                <input type="radio" name="q3" value="35"> 35 <br><br>

                                <button class="btn btn-primary w-100">
                                        Submit Quiz
                                </button>

                        </form>

                </div>

        </div>

</body>

</html>
