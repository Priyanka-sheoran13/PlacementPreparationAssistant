<!DOCTYPE html>
<html>

<head>
        <title>Aptitude Test</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
                body {
                        background: #f4f7fc;
                }

                .card {
                        border: none;
                        border-radius: 20px;
                        transition: .3s;
                }

                .card:hover {
                        transform: scale(1.05);
                }
        </style>

</head>

<body>

        <div class="container mt-5">

                <h1 class="text-center mb-5">
                        🧠 Aptitude Practice
                </h1>

                <div class="row">

                        <div class="col-md-4">

                                <div class="card shadow p-4 text-center">

                                        <h2>🟢 Easy</h2>

                                        <p>Basic aptitude questions.</p>

                                        <a href="/easy" class="btn btn-success">
                                                Start
                                        </a>

                                </div>

                        </div>

                        <div class="col-md-4">

                                <div class="card shadow p-4 text-center">

                                        <h2>🟡 Medium</h2>

                                        <p>Placement level questions.</p>

                                        <a href="/medium" class="btn btn-warning">
                                                Start
                                        </a>

                                </div>

                        </div>

                        <div class="col-md-4">

                                <div class="card shadow p-4 text-center">

                                        <h2>🔴 Hard</h2>

                                        <p>Company level questions.</p>

                                        <a href="/hard" class="btn btn-danger">
                                                Start
                                        </a>

                                </div>

                        </div>

                </div>

        </div>

</body>

</html>
