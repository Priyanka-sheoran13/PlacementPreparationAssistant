<!DOCTYPE html>
<html lang="en">

<head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>AI Student Assistant</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
                body {
                        background: #eef3f8;
                        font-family: Arial, Helvetica, sans-serif;
                }

                .header {
                        background: linear-gradient(90deg, #0d6efd, #20c997);
                        color: white;
                        padding: 25px;
                        text-align: center;
                }

                .chat-container {

                        width: 90%;
                        max-width: 900px;

                        margin: 30px auto;

                        background: white;

                        border-radius: 15px;

                        box-shadow: 0 8px 20px rgba(0, 0, 0, .1);

                        overflow: hidden;

                }

                #chatBox {

                        height: 500px;

                        overflow-y: auto;

                        padding: 20px;

                        background: #f8f9fa;

                }

                .message {

                        max-width: 75%;

                        padding: 12px 18px;

                        border-radius: 15px;

                        margin-bottom: 15px;

                        word-wrap: break-word;

                }

                .user {

                        background: #0d6efd;

                        color: white;

                        margin-left: auto;

                }

                .bot {

                        background: #e9ecef;

                        color: black;

                }

                .input-area {

                        display: flex;

                        padding: 15px;

                        border-top: 1px solid #ddd;

                }

                #userInput {

                        flex: 1;

                        border-radius: 10px;

                        padding: 10px;

                        border: 1px solid #ccc;

                }

                button {

                        margin-left: 10px;

                }
        </style>

</head>

<body>

        <div class="header">

                <h2>🤖 AI Student Assistant</h2>

                <p>Ask anything about Coding, Placement & Interview</p>

        </div>

        <div class="chat-container">

                <div id="chatBox">

                        <div class="message bot">

                                👋 Hello! I am your AI Student Assistant.

                                Ask me anything related to coding, placements or interviews.

                        </div>

                </div>

                <div class="input-area">

                        <input type="text" id="userInput" class="form-control" placeholder="Type your question...">

                        <button class="btn btn-primary" onclick="sendMessage()">

                                Send

                        </button>

                </div>

        </div>
        <script>

                function addMessage(message, sender) {

                        const chatBox = document.getElementById("chatBox");

                        const div = document.createElement("div");

                        div.classList.add("message");

                        if (sender === "user")
                                div.classList.add("user");
                        else
                                div.classList.add("bot");

                        div.innerHTML = message;

                        chatBox.appendChild(div);

                        chatBox.scrollTop = chatBox.scrollHeight;

                }

                function sendMessage() {

                        const input = document.getElementById("userInput");

                        const text = input.value.trim();

                        if (text === "")
                                return;

                        addMessage(text, "user");

                        input.value = "";

                        botReply(text);

                }

                function botReply(text) {

                        fetch("/chat", {

                                method: "POST",

                                headers: {

                                        "Content-Type": "application/json"

                                },

                                body: JSON.stringify({

                                        message: text

                                })

                        })

                                .then(response => response.json())

                                .then(data => {

                                        addMessage(data.reply, "bot");

                                })

                                .catch(() => {

                                        addMessage("⚠️ Error connecting to chatbot.", "bot");

                                });

                }

                document.getElementById("userInput").addEventListener("keypress", function (e) {

                        if (e.key === "Enter") {

                                sendMessage();

                        }

                });

        </script>

</body>

</html>
