<!DOCTYPE html>
<html lang="en">

<head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Company Preparation</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
                body {
                        background: #eef3f8;
                        font-family: Arial, Helvetica, sans-serif;
                }

                .header {
                        background: linear-gradient(90deg, #0d6efd, #20c997);
                        color: white;
                        text-align: center;
                        padding: 30px;
                        margin-bottom: 30px;
                }

                .card {
                        border: none;
                        border-radius: 15px;
                        box-shadow: 0 8px 20px rgba(0, 0, 0, .1);
                }

                .progress {
                        height: 12px;
                }

                .badge {
                        font-size: 15px;
                }

                button {
                        margin: 5px;
                }
        </style>

</head>

<body>

        <div class="header">

                <h1>🏢 Company Preparation</h1>

                <h5>Top Placement Companies Guide</h5>

        </div>

        <div class="container">

                <div class="card p-4">

                        <h5 id="companyNo"></h5>

                        <div class="progress mb-3">

                                <div id="progressBar" class="progress-bar bg-success" style="width:0%">
                                </div>

                        </div>

                        <h2 id="companyName"></h2>

                        <hr>
                        <!-- Company Overview -->

                        <h4>📖 Company Overview</h4>

                        <p id="overview"></p>

                        <hr>

                        <!-- Eligibility -->

                        <h4>🎓 Eligibility Criteria</h4>

                        <p id="eligibility"></p>

                        <hr>

                        <!-- Selection Process -->

                        <h4>🔄 Selection Process</h4>

                        <p id="process"></p>

                        <hr>

                        <!-- Salary Package -->

                        <h4>💰 Salary Package</h4>

                        <p id="salary"></p>

                        <hr>

                        <!-- Interview Questions -->

                        <h4>❓ Frequently Asked Interview Questions</h4>

                        <ul id="questions">

                        </ul>

                        <hr>

                        <!-- Preparation Tips -->

                        <h4>💡 Preparation Tips</h4>

                        <ul id="tips">

                        </ul>

                        <hr>

                        <div class="d-flex justify-content-between">

                                <button class="btn btn-secondary" onclick="previousCompany()">

                                        ⬅ Previous

                                </button>

                                <button class="btn btn-success" onclick="nextCompany()">

                                        Next ➡

                                </button>

                        </div>

                        <div class="text-center mt-4">

                                <button class="btn btn-primary btn-lg" onclick="submitCompanies()">

                                        ✅ Finish Preparation

                                </button>

                        </div>

                </div>

                <div class="card p-4 mt-4 text-center" id="resultCard" style="display:none;">

                        <h2>🎉 Company Preparation Completed</h2>

                        <h3 id="score"></h3>

                        <h3 id="grade"></h3>

                </div>

        </div>

        <script>

                const companies = JSON.parse('{{ companies | tojson | safe }}');

                let currentCompany = 0;

                let completed = [];
                function loadCompany() {

                        let c = companies[currentCompany];

                        document.getElementById("companyNo").innerHTML =
                                "Company " + (currentCompany + 1) + " / " + companies.length;

                        document.getElementById("companyName").innerHTML =
                                c.name;

                        document.getElementById("overview").innerHTML =
                                c.overview;

                        document.getElementById("eligibility").innerHTML =
                                c.eligibility;

                        document.getElementById("process").innerHTML =
                                c.process;

                        document.getElementById("salary").innerHTML =
                                c.salary;

                        document.getElementById("progressBar").style.width =
                                ((currentCompany + 1) / companies.length * 100) + "%";

                        let questionList = document.getElementById("questions");

                        questionList.innerHTML = "";

                        c.questions.forEach(function (item) {

                                questionList.innerHTML +=
                                        "<li>" + item + "</li>";

                        });

                        let tipList = document.getElementById("tips");

                        tipList.innerHTML = "";

                        c.tips.forEach(function (item) {

                                tipList.innerHTML +=
                                        "<li>" + item + "</li>";

                        });

                }
                function nextCompany() {

                        if (!completed[currentCompany]) {

                                completed[currentCompany] = true;

                        }

                        if (currentCompany < companies.length - 1) {

                                currentCompany++;

                                loadCompany();

                        } else {

                                alert("🎉 You have reached the last company.");

                        }

                }

                function previousCompany() {

                        if (currentCompany > 0) {

                                currentCompany--;

                                loadCompany();

                        } else {

                                alert("This is the first company.");

                        }

                }

                function submitCompanies() {

                        let viewed = completed.filter(Boolean).length;

                        if (currentCompany === companies.length - 1 && !completed[currentCompany]) {

                                viewed++;
                        }

                        let percentage = Math.round((viewed / companies.length) * 100);
                        localStorage.setItem("company", percentage);
                        let grade = "Fail";

                        if (percentage >= 90)
                                grade = "A+";
                        else if (percentage >= 80)
                                grade = "A";
                        else if (percentage >= 70)
                                grade = "B";
                        else if (percentage >= 60)
                                grade = "C";

                        document.querySelector(".card").style.display = "none";

                        document.getElementById("resultCard").style.display = "block";

                        document.getElementById("score").innerHTML =
                                "Companies Completed : " + viewed + " / " + companies.length +
                                "<br><br>Completion : " + percentage + "%";

                        document.getElementById("grade").innerHTML =
                                "Grade : " + grade;

                }

                loadCompany();

        </script>

</body>

</html>
