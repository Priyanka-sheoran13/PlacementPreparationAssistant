<!DOCTYPE html>
<html lang="en">

<head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Quiz Result</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
                body {
                        background: linear-gradient(135deg, #4facfe, #00f2fe);
                        font-family: Arial, sans-serif;
                }

                .card {
                        max-width: 600px;
                        margin: 60px auto;
                        padding: 40px;
                        border-radius: 20px;
                        text-align: center;
                        box-shadow: 0 15px 35px rgba(0, 0, 0, .2);
                }

                h1 {
                        color: #0d6efd;
                        font-weight: bold;
                }

                .score {
                        font-size: 60px;
                        font-weight: bold;
                        color: #198754;
                }

                .percentage {
                        font-size: 30px;
                        color: #fd7e14;
                }

                .grade {
                        font-size: 45px;
                        color: #dc3545;
                        font-weight: bold;
                }
        </style>

</head>

<body>

        <div class="card">

                <h1>🎉 Quiz Completed</h1>

                <hr>

                <h4>Your Score</h4>

                <div class="score">

                        {{ score }} / {{ total }}

                </div>

                <br>

                <h4>Percentage</h4>

                <div class="percentage">

                        {{ percentage }}%

                </div>

                <br>

                <h4>Grade</h4>

                <div class="grade">

                        {{ grade }}

                </div>

                <br><br>

                <a href="/easy-quiz" class="btn btn-primary btn-lg">

                        🔄 Retry Quiz

                </a>

                <a href="/dashboard" class="btn btn-success btn-lg">

                        🏠 Dashboard

                </a>

        </div>

</body>

</html>
