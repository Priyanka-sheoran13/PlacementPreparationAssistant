<!DOCTYPE html>
<html lang="en">

<head>

        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Study Planner</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

        <style>
                * {

                        margin: 0;

                        padding: 0;

                        box-sizing: border-box;

                        font-family: Arial, Helvetica, sans-serif;

                }

                body {

                        min-height: 100vh;

                        background: linear-gradient(135deg, #4F46E5, #06B6D4);

                        background-attachment: fixed;

                }

                .header {

                        text-align: center;

                        padding: 40px 20px;

                        color: white;

                }

                .header h1 {

                        font-size: 42px;

                        font-weight: bold;

                }

                .header p {

                        font-size: 18px;

                        opacity: .9;

                        margin-top: 10px;

                }

                .main-container {

                        width: 92%;

                        max-width: 1200px;

                        margin: auto;

                        padding-bottom: 40px;

                }

                .stats {

                        display: grid;

                        grid-template-columns: repeat(3, 1fr);

                        gap: 20px;

                        margin-bottom: 30px;

                }

                .stat-card {

                        background: rgba(255, 255, 255, .18);

                        backdrop-filter: blur(12px);

                        border-radius: 20px;

                        padding: 25px;

                        text-align: center;

                        color: white;

                        box-shadow: 0 10px 25px rgba(0, 0, 0, .15);

                        transition: .3s;

                }

                .stat-card:hover {

                        transform: translateY(-8px);

                }

                .stat-card i {

                        font-size: 36px;

                        margin-bottom: 12px;

                }

                .stat-card h2 {

                        font-size: 34px;

                        margin-bottom: 5px;

                }

                .form-card {

                        background: white;

                        border-radius: 20px;

                        padding: 30px;

                        box-shadow: 0 12px 25px rgba(0, 0, 0, .15);

                        margin-bottom: 30px;

                }

                .form-card h3 {

                        margin-bottom: 25px;

                        font-weight: bold;

                        color: #4F46E5;

                }

                label {

                        font-weight: bold;

                        margin-bottom: 8px;

                }

                .form-control,

                .form-select {

                        border-radius: 12px;

                        padding: 12px;

                }

                .btn-save {

                        width: 100%;

                        padding: 14px;

                        font-size: 18px;

                        font-weight: bold;

                        border-radius: 12px;

                        margin-top: 10px;

                        background: #4F46E5;

                        border: none;

                        transition: .3s;

                }

                .btn-save:hover {

                        background: #3730A3;

                        transform: scale(1.02);

                }

                .section-title {

                        color: white;

                        font-weight: bold;

                        margin-bottom: 20px;

                }

                .task-card {

                        background: white;

                        border-radius: 18px;

                        padding: 20px;

                        margin-bottom: 20px;

                        box-shadow: 0 10px 20px rgba(0, 0, 0, .12);

                        transition: .3s;

                }

                .task-card:hover {

                        transform: translateY(-6px);

                        box-shadow: 0 18px 35px rgba(0, 0, 0, .2);

                }

                .progress {

                        height: 18px;

                        border-radius: 20px;

                        overflow: hidden;

                }

                .progress-bar {

                        font-weight: bold;

                }

                @media(max-width:768px) {

                        .stats {

                                grid-template-columns: 1fr;

                        }

                        .header h1 {

                                font-size: 32px;

                        }

                }
        </style>

</head>

<body>

        <div class="header">

                <h1>📅 Study Planner</h1>

                <p>Plan Smart • Study Better • Achieve More</p>

        </div>

        <div class="main-container">

                <div class="stats">

                        <div class="stat-card">

                                <i class="fa-solid fa-book-open"></i>

                                <h2 id="totalTasks">0</h2>

                                <p>Total Tasks</p>

                        </div>

                        <div class="stat-card">

                                <i class="fa-solid fa-circle-check"></i>

                                <h2 id="completedTasks">0</h2>

                                <p>Completed</p>

                        </div>

                        <div class="stat-card">

                                <i class="fa-solid fa-clock"></i>

                                <h2 id="pendingTasks">0</h2>

                                <p>Pending</p>

                        </div>

                </div>

                <div class="form-card">

                        <h3>➕ Add New Study Task</h3>
                        <div class="row">

                                <div class="col-md-6 mb-3">

                                        <label>📅 Select Day</label>

                                        <select id="day" class="form-select">

                                                <option>Monday</option>
                                                <option>Tuesday</option>
                                                <option>Wednesday</option>
                                                <option>Thursday</option>
                                                <option>Friday</option>
                                                <option>Saturday</option>
                                                <option>Sunday</option>

                                        </select>

                                </div>

                                <div class="col-md-6 mb-3">

                                        <label>⏰ Study Time</label>

                                        <input type="time" id="time" class="form-control">

                                </div>

                        </div>

                        <div class="row">

                                <div class="col-md-6 mb-3">

                                        <label>📚 Subject</label>

                                        <select id="subject" class="form-select">

                                                <option>Python</option>
                                                <option>Java</option>
                                                <option>C</option>
                                                <option>C++</option>
                                                <option>SQL</option>
                                                <option>DSA</option>
                                                <option>DBMS</option>
                                                <option>Operating System</option>
                                                <option>Computer Networks</option>
                                                <option>Aptitude</option>
                                                <option>Interview Preparation</option>
                                                <option>Resume</option>
                                                <option>Company Preparation</option>

                                        </select>

                                </div>

                                <div class="col-md-6 mb-3">

                                        <label>🎯 Priority</label>

                                        <select id="priority" class="form-select">

                                                <option value="High">🔴 High</option>

                                                <option value="Medium" selected>🟡 Medium</option>

                                                <option value="Low">🟢 Low</option>

                                        </select>

                                </div>

                        </div>

                        <div class="mb-3">

                                <label>📝 Study Task</label>

                                <textarea id="task" rows="4" class="form-control"
                                        placeholder="Example: Solve 15 Array Questions from C++...">

        </textarea>

                        </div>

                        <button class="btn btn-primary btn-save" onclick="saveTask()">

                                <i class="fa-solid fa-floppy-disk"></i>

                                Save Study Task

                        </button>

                </div>

                <h3 class="section-title">

                        📋 Today's Study Tasks

                </h3>

                <div class="mb-4">

                        <input type="text" id="searchTask" class="form-control"
                                placeholder="🔍 Search by Subject or Task..." onkeyup="displayTasks()">

                </div>

                <div id="taskList"></div>

                <div class="mt-4">

                        <h5 class="text-white fw-bold">

                                Today's Progress

                        </h5>

                        <div class="progress mt-2">

                                <div id="progressBar" class="progress-bar bg-success" style="width:0%;">

                                        0%

                                </div>

                        </div>

                </div>
                <script>

                        let tasks = JSON.parse(localStorage.getItem("studyTasks")) || [];

                        function saveTask() {

                                const day = document.getElementById("day").value;

                                const time = document.getElementById("time").value;

                                const subject = document.getElementById("subject").value;

                                const priority = document.getElementById("priority").value;

                                const task = document.getElementById("task").value.trim();

                                if (task == "") {

                                        Swal.fire({

                                                icon: "warning",

                                                title: "Task Required",

                                                text: "Please enter a study task."

                                        });

                                        return;

                                }

                                tasks.push({

                                        day,

                                        time,

                                        subject,

                                        priority,

                                        task,

                                        completed: false

                                });

                                tasks.sort((a, b) => a.time.localeCompare(b.time));

                                localStorage.setItem("studyTasks", JSON.stringify(tasks));

                                document.getElementById("task").value = "";

                                Swal.fire({

                                        icon: "success",

                                        title: "Task Saved",

                                        text: "Keep Learning 🚀",

                                        timer: 1500,

                                        showConfirmButton: false

                                });

                                displayTasks();

                        }
                        function displayTasks() {

                                const taskList = document.getElementById("taskList");

                                const search = document.getElementById("searchTask").value.toLowerCase();

                                taskList.innerHTML = "";

                                if (tasks.length == 0) {

                                        taskList.innerHTML = `

    <div class="task-card text-center">

        <h3>📚</h3>

        <h4>No Tasks Yet</h4>

        <p class="text-muted">

        Add your first study task and start preparing 🚀

        </p>

    </div>

    `;

                                        updateStats();

                                        return;

                                }

                                tasks.forEach((item, index) => {

                                        if (

                                                !item.task.toLowerCase().includes(search)

                                                &&

                                                !item.subject.toLowerCase().includes(search)

                                        )

                                                return;
                                        taskList.innerHTML += `

<div class="task-card">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h4>

            📚 ${item.subject}

            ${item.completed
                                                        ?
                                                        '<span class="badge bg-success ms-2">Completed</span>'
                                                        :
                                                        '<span class="badge bg-warning text-dark ms-2">Pending</span>'
                                                }

        </h4>

        <span class="badge ${item.priority == "High"
                                                        ? "bg-danger"
                                                        : item.priority == "Medium"
                                                                ? "bg-warning text-dark"
                                                                : "bg-success"
                                                }">
    ${item.priority == "High"
                                                        ? "🔴 High"
                                                        : item.priority == "Medium"
                                                                ? "🟡 Medium"
                                                                : "🟢 Low"
                                                }
</span>

    </div>

    <p><b>📅 Day:</b> ${item.day}</p>

    <p><b>⏰ Time:</b> ${item.time}</p>

    <p style="${item.completed
                                                        ?
                                                        'text-decoration:line-through;color:gray;'
                                                        :
                                                        ''
                                                }">

        <b>📝 Task:</b>

        ${item.task}

    </p>

    <div class="mt-3">

        <button

        class="btn btn-success"

        onclick="completeTask(${index})">

        ✅ Complete

        </button>

        <button

        class="btn btn-danger ms-2"

        onclick="deleteTask(${index})">

        🗑 Delete

        </button>

    </div>

</div>

`;

                                });

                                updateStats();

                        }
                        function completeTask(index) {

                                tasks[index].completed = true;

                                localStorage.setItem(

                                        "studyTasks",

                                        JSON.stringify(tasks)

                                );

                                Swal.fire({

                                        icon: "success",

                                        title: "Great Job! 🎉",

                                        text: "Task Completed Successfully.",

                                        timer: 1500,

                                        showConfirmButton: false

                                });

                                displayTasks();

                        }

                        function deleteTask(index) {

                                Swal.fire({

                                        title: "Delete Task?",

                                        text: "This action cannot be undone.",

                                        icon: "warning",

                                        showCancelButton: true,

                                        confirmButtonColor: "#d33",

                                        confirmButtonText: "Delete"

                                }).then((result) => {

                                        if (result.isConfirmed) {

                                                tasks.splice(index, 1);

                                                localStorage.setItem(

                                                        "studyTasks",

                                                        JSON.stringify(tasks)

                                                );

                                                displayTasks();

                                        }

                                });

                        }

                        function updateStats() {

                                let completed = tasks.filter(

                                        task => task.completed

                                ).length;

                                let total = tasks.length;

                                let pending = total - completed;

                                document.getElementById("totalTasks").innerHTML = total;

                                document.getElementById("completedTasks").innerHTML = completed;

                                document.getElementById("pendingTasks").innerHTML = pending;

                                let percent = 0;

                                if (total > 0)

                                        percent = Math.round((completed / total) * 100);

                                document.getElementById("progressBar").style.width = percent + "%";

                                document.getElementById("progressBar").innerHTML = percent + "%";

                        }
                        displayTasks();

                </script>

</body>

</html>
