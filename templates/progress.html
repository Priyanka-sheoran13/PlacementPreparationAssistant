<!DOCTYPE html>
<html lang="en">

<head>

        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Progress Tracker</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

        <style>
                * {

                        margin: 0;

                        padding: 0;

                        box-sizing: border-box;

                        font-family: Arial, Helvetica, sans-serif;

                }

                body {

                        min-height: 100vh;

                        background: linear-gradient(135deg, #6C63FF, #FF8A00);

                        background-attachment: fixed;

                }

                .header {

                        padding: 40px;

                        text-align: center;

                        color: white;

                }

                .header h1 {

                        font-size: 42px;

                        font-weight: bold;

                }

                .header p {

                        font-size: 18px;

                        opacity: .9;

                        margin-top: 10px;

                }

                .main-container {

                        width: 92%;

                        max-width: 1200px;

                        margin: auto;

                        padding-bottom: 40px;

                }

                .summary-card {

                        background: rgba(255, 255, 255, .18);

                        backdrop-filter: blur(12px);

                        border-radius: 20px;

                        padding: 30px;

                        color: white;

                        text-align: center;

                        margin-bottom: 30px;

                        box-shadow: 0 12px 30px rgba(0, 0, 0, .18);

                }

                .summary-card h2 {

                        font-size: 34px;

                        margin-bottom: 15px;

                }

                .progress {

                        height: 22px;

                        border-radius: 20px;

                        overflow: hidden;

                }

                .progress-bar {

                        font-weight: bold;

                        font-size: 15px;

                }

                .modules {

                        display: grid;

                        grid-template-columns: repeat(2, 1fr);

                        gap: 20px;

                }

                .module-card {

                        background: white;

                        border-radius: 18px;

                        padding: 22px;

                        box-shadow: 0 10px 20px rgba(0, 0, 0, .15);

                        transition: .3s;

                }

                .module-card:hover {

                        transform: translateY(-6px);

                }

                .module-card h4 {

                        margin-bottom: 15px;

                        color: #4F46E5;

                }

                @media(max-width:768px) {

                        .modules {

                                grid-template-columns: 1fr;

                        }

                        .header h1 {

                                font-size: 32px;

                        }

                }
        </style>

</head>

<body>

        <div class="header">

                <h1>📊 Progress Tracker</h1>

                <p>Track your placement preparation journey</p>

        </div>

        <div class="main-container">

                <div class="summary-card">

                        <h2>Overall Progress</h2>

                        <div class="progress">

                                <div id="overallProgress" class="progress-bar bg-success" style="width:0%">

                                        0%

                                </div>

                        </div>

                </div>

                <div class="modules">
                        <!-- Aptitude -->

                        <div class="module-card">

                                <h4>📚 Aptitude</h4>

                                <div class="progress">

                                        <div id="aptitudeBar" class="progress-bar bg-primary" style="width:0%">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- Python -->

                        <div class="module-card">

                                <h4>🐍 Python</h4>

                                <div class="progress">

                                        <div id="pythonBar" class="progress-bar bg-success" style="width:0%">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- Java -->

                        <div class="module-card">

                                <h4>☕ Java</h4>

                                <div class="progress">

                                        <div id="javaBar" class="progress-bar bg-warning text-dark" style="width:0%">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- C++ -->

                        <div class="module-card">

                                <h4>💻 C++</h4>

                                <div class="progress">

                                        <div id="cppBar" class="progress-bar bg-info" style="width:0%">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- C -->

                        <div class="module-card">

                                <h4>⚙️ C Programming</h4>

                                <div class="progress">

                                        <div id="cBar" class="progress-bar bg-secondary" style="width:0%">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- SQL -->

                        <div class="module-card">

                                <h4>🗄 SQL</h4>

                                <div class="progress">

                                        <div id="sqlBar" class="progress-bar bg-danger" style="width:0%">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- Interview -->

                        <div class="module-card">

                                <h4>🎤 Interview</h4>

                                <div class="progress">

                                        <div id="interviewBar" class="progress-bar bg-dark" style="width:0%">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- Resume -->

                        <div class="module-card">

                                <h4>📄 Resume</h4>

                                <div class="progress">

                                        <div id="resumeBar" class="progress-bar" style="width:0%; background:#8B5CF6;">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- Company -->

                        <div class="module-card">

                                <h4>🏢 Company Preparation</h4>

                                <div class="progress">

                                        <div id="companyBar" class="progress-bar" style="width:0%; background:#EC4899;">

                                                0%

                                        </div>

                                </div>

                        </div>

                        <!-- Study Planner -->

                        <div class="module-card">

                                <h4>📅 Study Planner</h4>

                                <div class="progress">

                                        <div id="plannerBar" class="progress-bar" style="width:0%; background:#10B981;">

                                                0%

                                        </div>

                                </div>

                        </div>

                </div>
                <script>

                        const progress = {

                                aptitude: Number(localStorage.getItem("aptitude")) || 0,

                                python: Number(localStorage.getItem("python")) || 0,

                                java: Number(localStorage.getItem("java")) || 0,

                                cpp: Number(localStorage.getItem("cpp")) || 0,

                                c: Number(localStorage.getItem("c")) || 0,

                                sql: Number(localStorage.getItem("sql")) || 0,

                                interview: Number(localStorage.getItem("interview")) || 0,

                                resume: Number(localStorage.getItem("resume")) || 0,

                                company: Number(localStorage.getItem("company")) || 0,

                                planner: Number(localStorage.getItem("planner")) || 0

                        };

                        function setProgress(id, value) {

                                const bar = document.getElementById(id);

                                bar.style.width = value + "%";

                                bar.innerHTML = value + "%";

                        }

                        setProgress("aptitudeBar", progress.aptitude);

                        setProgress("pythonBar", progress.python);

                        setProgress("javaBar", progress.java);

                        setProgress("cppBar", progress.cpp);

                        setProgress("cBar", progress.c);

                        setProgress("sqlBar", progress.sql);

                        setProgress("interviewBar", progress.interview);

                        setProgress("resumeBar", progress.resume);

                        setProgress("companyBar", progress.company);

                        setProgress("plannerBar", progress.planner);

                        const values = Object.values(progress);

                        const overall = Math.round(

                                values.reduce((a, b) => a + b, 0) / values.length

                        );

                        document.getElementById("overallProgress").style.width = overall + "%";

                        document.getElementById("overallProgress").innerHTML = overall + "%";

                </script>

</body>

</html>
