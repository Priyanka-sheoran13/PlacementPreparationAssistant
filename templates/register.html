<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register | Placement Preparation Assistant</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body style="background: linear-gradient(135deg,#4facfe,#00f2fe);">

        <div class="container">

                <div class="row justify-content-center align-items-center vh-100">

                        <div class="col-md-6 col-lg-5">

                                <div class="card shadow-lg border-0 rounded-4">

                                        <div class="card-body p-5">

                                                <h2 class="text-center text-success fw-bold mb-3">
                                                        📝 Create Account
                                                </h2>

                                                <p class="text-center text-muted mb-4">
                                                        Join the Placement Preparation Assistant and start your
                                                        placement journey today.
                                                </p>

                                                <form method="POST">

                                                        <div class="mb-3">

                                                                <label class="form-label fw-semibold">
                                                                        Full Name
                                                                </label>

                                                                <input type="text" class="form-control" name="name"
                                                                        placeholder="Enter your full name" required>

                                                        </div>

                                                        <div class="mb-3">

                                                                <label class="form-label fw-semibold">
                                                                        Email Address
                                                                </label>

                                                                <input type="email" class="form-control" name="email"
                                                                        placeholder="Enter your email" required>

                                                        </div>

                                                        <div class="mb-4">

                                                                <label class="form-label fw-semibold">
                                                                        Password
                                                                </label>

                                                                <input type="password" class="form-control"
                                                                        name="password"
                                                                        placeholder="Create a strong password" required>

                                                        </div>

                                                        <button class="btn btn-success w-100 btn-lg">
                                                                Create Account
                                                        </button>

                                                </form>

                                                <hr>

                                                <p class="text-center mb-2">

                                                        Already have an account?

                                                        <a href="{{ url_for('login') }}">
                                                                Login Here
                                                        </a>

                                                </p>

                                                <div class="text-center">

                                                        <a href="{{ url_for('home') }}"
                                                                class="btn btn-outline-secondary">
                                                                ⬅ Back to Home
                                                        </a>

                                                </div>

                                        </div>

                                </div>

                        </div>

                </div>

        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
